kind = "web"
previewPath = "/"
title = "NOW! Timer"
version = "1.0.0"
id = "artifacts/now-timer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24250

[services.development]
run = "pnpm --filter @workspace/now-timer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/now-timer", "run", "build" ]
publicDir = "artifacts/now-timer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24250"
BASE_PATH = "/"
